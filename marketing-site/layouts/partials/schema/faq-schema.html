{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"Muss ich als Freelancer meine Arbeitszeit erfassen?","acceptedAnswer":{"@type":"Answer","text":"Juristische Verpflichtung zur Zeiterfassung existiert für Freiberufler nicht — anders als für Arbeitnehmer unter ArbZeitG. Allerdings: Wer nach Stundensatz abrechnet, muss die geleisteten Stunden dokumentieren können (Nachweispflicht gegenüber dem Kunden). Ohne Zeiterfassung entsteht ein Informationsvakuum, das später zu Disputes über Abrechnung führt. Best Practice: Täglich 2 Minuten Tracking für Transparenz und Rechnungssicherheit."}},{"@type":"Question","name":"Wie kann ich meine Zeiterfassung mit Rechnungen verbinden?","acceptedAnswer":{"@type":"Answer","text":"Modernes Invoicing-System arbeitet mit direkter Verknüpfung: Zeiteinträge (Datum, Projekt, Stunden, Satz) werden zu Rechnungspositionen aggregiert. Das System zählt die Stunden pro Projekt/Phase, multipliziert mit dem definierten Stundensatz und generiert daraus die Rechnung automatisch. Vorteil: Keine manuellen Fehler, Audit-Trail, und der Kunde sieht die Transparenz zwischen geleisteter Zeit und Rechnung."}},{"@type":"Question","name":"Was muss ich bei der Stundensatzabrechnung beachten?","acceptedAnswer":{"@type":"Answer","text":"Der Stundensatz ist die zentrale Größe für deine Rentabilität — berechne ihn: (Jahresausgaben + Gewinnziel) / verfügbare Arbeitsstunden im Jahr. Häufiger Fehler: Zu niedrig ansetzen, weil man mit höherem Satz nicht wettbewerbsfähig fühlt. Realität: Top-Freelancer (Design, Entwicklung, Beratung) im deutschsprachigen Raum sind zwischen €60–€150/h unterwegs. Dokumentiere deinen Satz in deiner Leistungsbeschreibung und Angeboten — das signalisiert Professionalism."}},{"@type":"Question","name":"Wie dokumentiere ich meine Arbeitszeit rechtssicher?","acceptedAnswer":{"@type":"Answer","text":"GoBD verlangt: einzeln, vollständig, richtig, zeitgerecht, geordnet, nachprüfbar, unveränderbar. Das bedeutet konkret: Tägliches Tracking (nicht nachträglich alles am Wochenende eintragen), mit Projekt/Klient/Tätigkeit gekennzeichnet, unveränderbar archiviert (keine Excel-Tabellen, die man hinterher anfasst). Ein dediziertes System mit Audit-Log und Datumsstempel erfüllt dies. Papier oder E-Mails sind nicht ausreichend."}},{"@type":"Question","name":"Kann ich nachträglich Rechnungen aus Zeiterfassungsdaten generieren?","acceptedAnswer":{"@type":"Answer","text":"Ja — das ist sogar die Standard-Praxis in professionellen Invoicing-Systemen. Du erfasst die Zeit, das System generiert später (beim Kunden-Rechnungstermin oder monatlich) Rechnungen direkt aus den Zeiteinträgen. Vorteil: Keine Abweichungen zwischen Zeiterfassung und Abrechnung. Wichtig: Der Zeitstempel der Tätigkeit (nicht des Rechnungsdatum) muss dokumentieren, dass die Arbeit tatsächlich geleistet wurde — das ist für GoBD notwendig."}},{"@type":"Question","name":"Was ist GoBD und muss ich es als Freelancer beachten?","acceptedAnswer":{"@type":"Answer","text":"GoBD = Grundsätze ordnungsmäßiger Buchführung — ein Regelwerk des deutschen Finanzamts für die korrekte Dokumentation von Geschäftsvorfällen. Es gilt für alle Unternehmer und Freiberufler, unabhängig von Größe oder Umsatz. GoBD schreibt vor: Rechnungen müssen einzeln, vollständig, korrekt, zeitgerecht, geordnet, nachprüfbar und unveränderbar dokumentiert werden. Verletzung kann zu Schätzung und Nachzahlungen führen — bis zu 10% der Einkünfte."}},{"@type":"Question","name":"Welche Anforderungen hat GoBD an meine Rechnungen?","acceptedAnswer":{"@type":"Answer","text":"Eine GoBD-konforme Rechnung enthält: Laufende Rechnungsnummer (ohne Lücken), Ausstellungsdatum, Leistungsdatum, Name und Anschrift beider Parteien, Beschreibung der Leistung, Menge und Preis, Steuersatz, Gesamtbetrag, Zahlungsbedingungen. Kritisch: Die Datei muss unveränderbar archiviert sein (nicht in einer Excel-Datei, die man hinterher bearbeitet). Digitale Originalrechnung oder PDF mit Langzeit-Archivierung erfüllen dies."}},{"@type":"Question","name":"Wie lange muss ich Rechnungen aufbewahren?","acceptedAnswer":{"@type":"Answer","text":"Gesetzliche Aufbewahrungsfrist: 10 Jahre für Rechnungen, Verträge und die Inventarliste. Diese Zeit beginnt am Jahresende, in dem die Rechnung ausgestellt wurde. Praktisch: Rechnungen aus 2026 müssen bis 31.12.2036 archiviert bleiben. Digitale Archivierung mit Langzeitformat (PDF/A) und sichere Speicherung (Cloud mit Backup) erfüllen diese Anforderung kosteneffizient."}},{"@type":"Question","name":"Sind PDF-Rechnungen GoBD-konform?","acceptedAnswer":{"@type":"Answer","text":"Einzelne PDF-Rechnungen sind nicht automatisch GoBD-konform — es kommt auf die Archivierung an. GoBD-konform wird das PDF, wenn es in einem revisionssicheren System mit Audit-Log, Zeitstempel und Unveränderbarkeit archiviert ist."}},{"@type":"Question","name":"Was passiert, wenn ich GoBD nicht einhalte?","acceptedAnswer":{"@type":"Answer","text":"Das Finanzamt kann bei Prüfung festgestellte Lücken oder Fehler in der Dokumentation als Indiz nehmen, um deine Einkünfte zu schätzen — bis zu 10% nach oben. Zusätzlich können Bußgelder bis €5.000 für grobe Verstöße anfallen."}},{"@type":"Question","name":"Was ist ZUGFeRD und brauche ich das?","acceptedAnswer":{"@type":"Answer","text":"ZUGFeRD ist ein hybrides Rechnungsformat, das PDF und eingebettete XML-Daten kombiniert. In Deutschland ein Standard, aber nicht verpflichtend für Freelancer. Du brauchst es, wenn Deine Kunden elektronische Rechnungen zur automatisierten Verarbeitung benötigen."}},{"@type":"Question","name":"Welche Vorteile hat eine ZUGFeRD-Rechnung?","acceptedAnswer":{"@type":"Answer","text":"Effizienzgewinn auf Kundenseite: Statt 27 Minuten manuelle Bearbeitung reduziert sich die Verarbeitungszeit auf ~5 Minuten. Compliance: ZUGFeRD erfüllt die europäische Norm EN-16931 und ist somit rechtssicher."}},{"@type":"Question","name":"Können Kunden ZUGFeRD-Rechnungen verarbeiten?","acceptedAnswer":{"@type":"Answer","text":"Ja — ZUGFeRD ist ein offener Standard. Große deutsche Unternehmen, Behörden und viele Mittelständler haben Systeme zur Verarbeitung. Keine Kompatibilitätsprobleme."}},{"@type":"Question","name":"Ist ZUGFeRD Pflicht oder optional?","acceptedAnswer":{"@type":"Answer","text":"Für Freelancer derzeit optional. Pflicht wird es ab 2025 für B2B-Rechnungen an Behörden und große Konzerne. Ab 2028 möglicherweise für alle B2B-Rechnungen."}},{"@type":"Question","name":"Wie unterscheidet sich ZUGFeRD von PDF-Rechnungen?","acceptedAnswer":{"@type":"Answer","text":"PDF ist eine Darstellungsform — lesbar für Menschen, aber nicht maschinenverarbeitbar. ZUGFeRD fügt strukturierte Daten (XML) hinzu, die Buchhaltungssysteme automatisch lesen können."}},{"@type":"Question","name":"Welche Angaben muss eine deutsche Rechnung enthalten?","acceptedAnswer":{"@type":"Answer","text":"Pflichtangaben nach UStG §14: Rechnungsnummer, Ausstellungsdatum, Name und Adresse beider Parteien, Menge und Beschreibung der Leistung, Entgelt, Steuersatz und Steuerbetrag, Zahlungsbedingungen."}},{"@type":"Question","name":"Wie nummeriere ich meine Rechnungen korrekt?","acceptedAnswer":{"@type":"Answer","text":"Rechnungsnummern müssen chronologisch, lückenlos und eindeutig sein — das ist eine GoBD-Anforderung. Du darfst Muster verwenden (z.B. 2026-001), aber keine Nummern auslassen oder rückdatieren."}},{"@type":"Question","name":"Darf ich Rechnungen stornieren?","acceptedAnswer":{"@type":"Answer","text":"Ja, aber mit Regeln. Eine Stornierung ist eine neue Rechnung mit negativem Betrag, nicht das Löschen der Originalrechnung. Die Originalrechnung bleibt im System mit neuer laufender Nummer für die Stornierung."}},{"@type":"Question","name":"Kann ich Rechnungen im Nachhinein ändern?","acceptedAnswer":{"@type":"Answer","text":"Nein — GoBD verbietet Nachbearbeitungen von Originalrechnungen. Wenn du einen Fehler entdeckst, musst du stornieren und eine neue Rechnung ausstellen."}},{"@type":"Question","name":"Was sind häufige Fehler bei Rechnungserstellung?","acceptedAnswer":{"@type":"Answer","text":"Top 5: (1) Falsche oder fehlende Steuersätze. (2) Rechnungsnummern mit Lücken — GoBD-Verstoß. (3) Kein Leistungsdatum. (4) Unvollständige Adressdaten. (5) Änderungen nach Versand — GoBD-Bruch. Lösung: System mit Validierung verwenden."}}]}
</script>
