<!DOCTYPE html>
<html lang="de" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FREA · Form Components</title>
  <style>
    :root {
      --color-primary: oklch(72% 0.17 165);
      --color-primary-hover: oklch(65% 0.17 165);
      --color-primary-subtle: oklch(96% 0.04 165);
      --color-bg-primary: oklch(98.5% 0.003 265);
      --color-bg-surface: oklch(100% 0 0);
      --color-bg-surface-raised: oklch(97% 0.005 265);
      --color-border-subtle: oklch(93% 0.006 265);
      --color-border-medium: oklch(88% 0.01 265);
      --color-text-primary: oklch(21% 0.02 265);
      --color-text-secondary: oklch(45% 0.02 265);
      --color-text-muted: oklch(65% 0.015 265);
      --color-accent-danger: oklch(58% 0.18 25);
      --color-accent-success: oklch(72% 0.17 165);
      --shadow-card: 0 1px 3px 0 rgb(0 0 0 / 0.06);
    }

    [data-theme="dark"] {
      --color-primary: oklch(78% 0.18 165);
      --color-primary-hover: oklch(83% 0.18 165);
      --color-primary-subtle: oklch(22% 0.06 165);
      --color-bg-primary: oklch(13% 0.015 265);
      --color-bg-surface: oklch(16% 0.015 265);
      --color-bg-surface-raised: oklch(20% 0.015 265);
      --color-border-subtle: oklch(22% 0.015 265);
      --color-border-medium: oklch(28% 0.015 265);
      --color-text-primary: oklch(93% 0.005 265);
      --color-text-secondary: oklch(65% 0.01 265);
      --color-text-muted: oklch(45% 0.01 265);
    }

    html {
      background-color: var(--color-bg-primary);
      color: var(--color-text-primary);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    body { margin: 0; padding: 0; }
    .nav { background-color: var(--color-bg-surface); border-bottom: 1px solid var(--color-border-subtle); padding: 1rem; }
    .nav a { display: inline-block; margin-right: 1rem; padding: 0.5rem 0.75rem; border-radius: 0.375rem; text-decoration: none; font-size: 0.875rem; font-weight: 500; color: var(--color-text-secondary); }

    .main { max-width: 40rem; margin: 0 auto; padding: 2rem 1rem; }
    .page-title { font-size: 1.875rem; font-weight: bold; margin-bottom: 2rem; }

    .form-group { margin-bottom: 1.5rem; }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }

    input, textarea, select {
      width: 100%;
      box-sizing: border-box;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--color-border-medium);
      border-radius: 0.375rem;
      background-color: var(--color-bg-surface);
      color: var(--color-text-primary);
      font-family: inherit;
      font-size: 0.875rem;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(72, 187, 120, 0.1);
    }

    input::placeholder { color: var(--color-text-muted); }
    textarea { resize: vertical; min-height: 6rem; }

    .form-help {
      font-size: 0.75rem;
      color: var(--color-text-muted);
      margin-top: 0.25rem;
    }

    .form-error {
      display: block;
      font-size: 0.75rem;
      color: var(--color-accent-danger);
      margin-top: 0.25rem;
    }

    .input-error {
      border-color: var(--color-accent-danger) !important;
    }

    .input-error:focus {
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1) !important;
    }

    .card {
      background-color: var(--color-bg-surface);
      border: 1px solid var(--color-border-subtle);
      border-radius: 0.5rem;
      padding: 1.5rem;
      box-shadow: var(--shadow-card);
      margin-bottom: 1.5rem;
    }

    .card-title {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    .button-group {
      display: flex;
      gap: 0.75rem;
      margin-top: 2rem;
    }

    .button {
      display: inline-flex;
      gap: 0.375rem;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.875rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .button-primary {
      background-color: var(--color-primary);
      color: white;
      flex: 1;
    }

    .button-primary:hover { background-color: var(--color-primary-hover); }

    .button-secondary {
      background-color: transparent;
      color: var(--color-text-primary);
      border: 1px solid var(--color-border-medium);
      flex: 1;
    }

    .button-secondary:hover { background-color: var(--color-bg-surface-raised); }

    .button-danger {
      background-color: var(--color-accent-danger);
      color: white;
    }

    .button-danger:hover { opacity: 0.9; }

    .button-ghost {
      background-color: transparent;
      color: var(--color-text-secondary);
      border: none;
    }

    .button-ghost:hover { background-color: var(--color-bg-surface-raised); }

    .two-column {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .dark-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      padding: 0.5rem 0.75rem;
      background-color: var(--color-bg-surface);
      border: 1px solid var(--color-border-medium);
      border-radius: 0.375rem;
      cursor: pointer;
    }

    @media (max-width: 640px) {
      .two-column { grid-template-columns: 1fr; }
      .button-group { flex-direction: column; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="#">Dashboard</a>
  <a href="#">Rechnungen</a>
  <a href="#">Kunden</a>
  <a href="#">Einstellungen</a>
</nav>

<button class="dark-toggle" onclick="toggleDarkMode()">🌙</button>

<main class="main">
  <h1 class="page-title">Form Components</h1>

  <form class="card">
    <h2 class="card-title">Rechnungsformular</h2>

    <div class="form-group">
      <label for="invoice_number">Rechnungsnummer</label>
      <input type="text" id="invoice_number" name="invoice_number" value="INV-2026-001" readonly />
      <div class="form-help">Automatisch generiert</div>
    </div>

    <div class="two-column">
      <div class="form-group">
        <label for="invoice_date">Rechnungsdatum</label>
        <input type="date" id="invoice_date" name="invoice_date" value="2026-05-04" />
      </div>
      <div class="form-group">
        <label for="due_date">Fälligkeitsdatum</label>
        <input type="date" id="due_date" name="due_date" value="2026-06-04" />
      </div>
    </div>

    <div class="form-group">
      <label for="client_id">Kunde</label>
      <select id="client_id" name="client_id">
        <option value="">— Kunde wählen —</option>
        <option value="1" selected>Acme GmbH</option>
        <option value="2">TechStart AG</option>
        <option value="3">Digital Solutions</option>
      </select>
    </div>

    <div class="form-group">
      <label for="notes">Notizen</label>
      <textarea id="notes" name="notes" placeholder="Optionale Notizen zum Projekt..."></textarea>
    </div>

    <div class="form-group">
      <label for="email">E-Mail Adresse</label>
      <input type="email" id="email" name="email" value="invalid-email" class="input-error" />
      <span class="form-error">Bitte geben Sie eine gültige E-Mail Adresse ein</span>
    </div>

    <div class="form-group">
      <label for="amount">Gesamtbetrag</label>
      <input type="text" id="amount" name="amount" value="€ 2.500,00" disabled />
      <div class="form-help">Wird automatisch berechnet</div>
    </div>

    <div class="button-group">
      <button type="submit" class="button button-primary">✓ Speichern</button>
      <button type="reset" class="button button-secondary">Zurücksetzen</button>
    </div>
  </form>

  <div class="card">
    <h2 class="card-title">Button Varianten</h2>

    <div style="display: grid; gap: 1rem;">
      <div>
        <p style="font-size: 0.875rem; color: var(--color-text-secondary); margin-bottom: 0.5rem;">Primary (Main CTA)</p>
        <button class="button button-primary">+ Neue Rechnung</button>
      </div>

      <div>
        <p style="font-size: 0.875rem; color: var(--color-text-secondary); margin-bottom: 0.5rem;">Secondary (Alternative)</p>
        <button class="button button-secondary">↻ Aktualisieren</button>
      </div>

      <div>
        <p style="font-size: 0.875rem; color: var(--color-text-secondary); margin-bottom: 0.5rem;">Danger (Destructive)</p>
        <button class="button button-danger">🗑 Löschen</button>
      </div>

      <div>
        <p style="font-size: 0.875rem; color: var(--color-text-secondary); margin-bottom: 0.5rem;">Ghost (Minimal)</p>
        <button class="button button-ghost">← Zurück</button>
      </div>
    </div>
  </div>
</main>

<script>
function toggleDarkMode() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  localStorage.setItem('theme', isDark ? 'light' : 'dark');
}
</script>

</body>
</html>
