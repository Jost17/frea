name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-hygiene:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Verify branch based on main (CLAUDE.md Rule 15)
        run: |
          git fetch origin main --depth=100
          BASE=$(git merge-base HEAD origin/main)
          if ! git log origin/main -100 --format="%H" | grep -qx "$BASE"; then
            echo "ERROR: Branch not based on main."
            echo "Create branches with: git checkout main && git pull && git checkout -b feat/..."
            echo "Merge base: $BASE"
            exit 1
          fi
          echo "OK: Branch based on main at ${BASE:0:12}"

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.2.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test --pass-with-no-tests

      - name: Validate ZUGFeRD Fixtures
        run: bun run test:zugferd
