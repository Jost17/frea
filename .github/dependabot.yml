version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 5
    target-branch: main
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm-non-major:
        update-types:
          - minor
          - patch
